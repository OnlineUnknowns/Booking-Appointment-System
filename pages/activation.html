<script>
/* ── EMERGENCY FALLBACK ACTIVATION ──────────────────────────────────────
   Self-contained. Runs last. Replaces any broken/Eel-poisoned listeners.
   Works on GitHub Pages with no backend, no Eel, no external deps.
──────────────────────────────────────────────────────────────────────── */
(function () {
  'use strict';

  var VALID_KEY   = 'ENTERPRISE2025';
  var REDIRECT    = './dashboard.html';
  var _activated  = false;  // hard guard against double execution

  function ready(fn) {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fn);
    } else {
      fn();
    }
  }

  ready(function () {

    /* ── 1. Kill all existing listeners on the button by cloning it ── */
    var oldBtn = document.getElementById('activateBtn');
    if (!oldBtn) { console.error('[fallback] #activateBtn not found'); return; }
    var btn = oldBtn.cloneNode(true);   // deep clone copies children (shimmer div)
    oldBtn.parentNode.replaceChild(btn, oldBtn);

    var input = document.getElementById('licenseKey');
    if (!input) { console.error('[fallback] #licenseKey not found'); return; }

    var hint = document.getElementById('demo-key-hint');

    /* ── 2. Resolve button text node safely ─────────────────────── */
    function setLabel(text) {
      var nodes = btn.childNodes;
      for (var i = 0; i < nodes.length; i++) {
        if (nodes[i].nodeType === 3) {   // Node.TEXT_NODE
          nodes[i].nodeValue = '\n    ' + text + '\n  ';
          return;
        }
      }
      btn.insertAdjacentText('beforeend', text);
    }

    /* ── 3. Core activation ──────────────────────────────────────── */
    function activate() {
      if (_activated) return;           // prevent any double-fire
      var key = (input.value || '').trim().toUpperCase();

      if (key === VALID_KEY) {
        _activated = true;
        try { localStorage.setItem('demo_license', 'active'); } catch(e) {}

        btn.disabled = true;
        btn.style.cssText += ';background:linear-gradient(135deg,#00C896,#00A878)!important;' +
                             'box-shadow:0 0 32px rgba(0,200,150,0.45)!important;';
        setLabel('Access Granted ✓');

        setTimeout(function () {
          window.location.href = REDIRECT;
        }, 800);

      } else {
        btn.disabled = true;
        btn.style.cssText += ';background:linear-gradient(135deg,#FF4D6A,#C0392B)!important;' +
                             'box-shadow:0 0 28px rgba(255,77,106,0.45)!important;';
        setLabel('Invalid License');

        setTimeout(function () {
          btn.disabled = false;
          btn.style.background = '';
          btn.style.boxShadow  = '';
          setLabel('Activate');
        }, 1500);
      }
    }

    /* ── 4. Attach clean listeners ───────────────────────────────── */
    btn.addEventListener('click', activate);

    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') activate();
    });

    if (hint) {
      hint.addEventListener('click', function () {
        input.value = VALID_KEY;
        input.focus();
      });
    }

    console.log('[fallback] activation listeners attached cleanly');
  });

})();
</script>
