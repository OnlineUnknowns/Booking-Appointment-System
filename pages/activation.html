<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>License Activation | AppointmentBot Enterprise</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-void:       #04060F;
      --bg-deep:       #080D1C;
      --bg-surface:    rgba(10, 18, 38, 0.88);
      --accent-cyan:   #00D4FF;
      --accent-violet: #7B5CFF;
      --accent-emerald:#00FFB3;
      --accent-amber:  #FFB830;
      --text-primary:  #E8EEFF;
      --text-secondary:#7E8FB5;
      --text-muted:    #3D4E72;
      --border-dim:    rgba(0, 212, 255, 0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Syne', sans-serif;
      background: var(--bg-void);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── Animated background ──────────────────────── */
    .bg-scene {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(100px); opacity: 0.16;
      animation: drift ease-in-out infinite alternate;
    }
    .orb-1 { width: 560px; height: 560px; background: var(--accent-violet); top: -180px; left: -160px; animation-duration: 20s; }
    .orb-2 { width: 460px; height: 460px; background: var(--accent-cyan);   bottom: -160px; right: -120px; animation-duration: 26s; animation-delay: -8s; }
    .orb-3 { width: 300px; height: 300px; background: var(--accent-emerald); top: 50%; left: 55%; animation-duration: 18s; animation-delay: -4s; }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(30px, 24px) scale(1.06); }
      100% { transform: translate(-18px, 40px) scale(0.96); }
    }

    .grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.035) 1px, transparent 1px);
      background-size: 38px 38px;
    }

    /* ── Page wrapper ─────────────────────────────── */
    .page-wrap {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 16px;
    }

    /* ── Card ─────────────────────────────────────── */
    .act-card {
      width: 100%; max-width: 440px;
      background: var(--bg-surface);
      backdrop-filter: blur(32px) saturate(160%);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      border: 1px solid var(--border-dim);
      border-radius: 24px;
      padding: 52px 48px 44px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 40px 90px rgba(0,0,0,0.6),
        0 0 70px rgba(0,212,255,0.07);
      opacity: 0;
    }

    .act-card::before {
      content: '';
      position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-violet), transparent);
      opacity: 0.65;
    }

    /* ── Scan line ────────────────────────────────── */
    .scan-line {
      position: absolute; left: 0; right: 0; height: 1px; top: 0;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.4), transparent);
      animation: scan 5s linear infinite;
      pointer-events: none;
    }
    @keyframes scan {
      0%   { top: 0%;   opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* ── Icon badge ───────────────────────────────── */
    .act-badge {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, rgba(0,212,255,0.14), rgba(123,92,255,0.14));
      border: 1px solid rgba(0,212,255,0.3);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 0 28px rgba(0,212,255,0.18);
    }

    /* ── Typography ───────────────────────────────── */
    .act-title {
      text-align: center;
      font-size: 26px; font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .act-sub {
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px; font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 36px;
    }

    /* ── Input ────────────────────────────────────── */
    .input-wrap {
      position: relative; margin-bottom: 14px;
    }
    .input-wrap svg {
      position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px;
      color: var(--text-muted); pointer-events: none;
      transition: color 0.2s;
    }
    #licenseKey {
      width: 100%;
      background: rgba(0,212,255,0.04);
      border: 1px solid rgba(0,212,255,0.14);
      border-radius: 12px;
      padding: 14px 16px 14px 46px;
      color: var(--accent-cyan);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; font-weight: 500;
      letter-spacing: 1.4px;
      outline: none;
      transition: border-color 0.22s, box-shadow 0.22s, background 0.22s;
      caret-color: var(--accent-cyan);
    }
    #licenseKey::placeholder {
      color: var(--text-muted);
      letter-spacing: 0.3px; font-weight: 300;
    }
    #licenseKey:focus {
      border-color: rgba(0,212,255,0.5);
      background: rgba(0,212,255,0.07);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1), 0 0 18px rgba(0,212,255,0.08);
    }

    /* ── Button ───────────────────────────────────── */
    #activateBtn {
      width: 100%;
      padding: 15px;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, #00BFFF, #7B5CFF);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.18s, box-shadow 0.25s;
      box-shadow: 0 0 28px rgba(0,191,255,0.3);
    }
    #activateBtn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.13), transparent);
      border-radius: inherit;
      pointer-events: none;
    }
    #activateBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 0 44px rgba(0,191,255,0.6), 0 10px 28px rgba(0,0,0,0.35);
    }
    #activateBtn:active:not(:disabled) { transform: translateY(0); }
    #activateBtn:disabled { cursor: not-allowed; }

    .btn-shimmer {
      position: absolute; top: 0; left: -80%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transform: skewX(-20deg);
      transition: left 0.5s ease;
      pointer-events: none;
    }
    #activateBtn:hover .btn-shimmer { left: 160%; }

    /* ── Divider ──────────────────────────────────── */
    .act-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0 18px;
    }
    .act-divider span {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,0.12), transparent);
    }
    .act-divider small {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px; color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Demo hint ────────────────────────────────── */
    .act-hint {
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px; color: var(--text-muted);
    }
    .hint-key {
      color: var(--accent-amber);
      font-weight: 600; letter-spacing: 0.5px;
      cursor: pointer;
      transition: color 0.2s, text-shadow 0.2s;
      border-bottom: 1px dashed rgba(255,184,48,0.35);
      padding-bottom: 1px;
    }
    .hint-key:hover {
      color: #FFD060;
      text-shadow: 0 0 10px rgba(255,208,96,0.4);
    }

    /* ── Status corner ────────────────────────────── */
    .act-corner {
      position: absolute; bottom: 18px; right: 22px;
      display: flex; align-items: center; gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px; color: var(--text-muted);
    }
    .act-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-emerald);
      box-shadow: 0 0 6px var(--accent-emerald);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .act-version {
      position: absolute; bottom: 18px; left: 22px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px; color: var(--text-muted);
    }
  </style>
</head>
<body>

<!-- Animated background -->
<div class="bg-scene">
  <div class="grid-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="page-wrap">
  <div class="act-card" id="act-card">
    <div class="scan-line"></div>

    <!-- Lock icon badge -->
    <div class="act-badge">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
           stroke="#00D4FF" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <div class="act-title">🔐 License Activation</div>
    <div class="act-sub">
      Enter your enterprise key to unlock<br>the full AppointmentBot suite.
    </div>

    <!-- Key input -->
    <div class="input-wrap">
      <input
        type="text"
        id="licenseKey"
        placeholder="Enter your license key"
        autocomplete="off"
        spellcheck="false"
        autocorrect="off"
        autocapitalize="characters"
      >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778
                 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
      </svg>
    </div>

    <!-- Activate button -->
    <button id="activateBtn">
      <div class="btn-shimmer"></div>
      Activate
    </button>

    <!-- Divider + hint -->
    <div class="act-divider">
      <span></span><small>demo access</small><span></span>
    </div>
    <div class="act-hint">
      Demo key:&nbsp;<span class="hint-key" id="demo-key-hint">ENTERPRISE2025</span>
    </div>

    <!-- Corner indicators -->
    <div class="act-corner">
      <div class="act-dot"></div>
      SECURE CONNECTION
    </div>
    <div class="act-version">Enterprise v2.0</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var VALID_KEY  = 'ENTERPRISE2025';
  var REDIRECT   = './dashboard.html';
  var _activated = false;

  /* ── Safe element getter ────────────────────────── */
  function el(id) {
    return document.getElementById(id);
  }

  /* ── Update button text (preserves shimmer div) ─── */
  function setLabel(btn, text) {
    var nodes = btn.childNodes;
    for (var i = 0; i < nodes.length; i++) {
      if (nodes[i].nodeType === 3) {
        nodes[i].nodeValue = '\n      ' + text + '\n    ';
        return;
      }
    }
    btn.insertAdjacentText('beforeend', text);
  }

  /* ── GSAP entrance ──────────────────────────────── */
  function animateIn() {
    if (typeof gsap !== 'undefined') {
      gsap.fromTo('#act-card',
        { opacity: 0, y: 32, scale: 0.96 },
        { opacity: 1, y: 0,  scale: 1,
          duration: 0.7, ease: 'power3.out', delay: 0.08 }
      );
    } else {
      var card = el('act-card');
      if (card) card.style.opacity = '1';
    }
  }

  /* ── Activation ─────────────────────────────────── */
  function activate() {
    if (_activated) return;

    var input = el('licenseKey');
    var btn   = el('activateBtn');
    if (!input || !btn) return;

    var key = (input.value || '').trim().toUpperCase();

    if (key === VALID_KEY) {
      _activated = true;
      try { localStorage.setItem('demo_license', 'active'); } catch (e) {}

      btn.disabled         = true;
      btn.style.background = 'linear-gradient(135deg,#00C896,#00A878)';
      btn.style.boxShadow  = '0 0 36px rgba(0,200,150,0.5)';
      setLabel(btn, 'Access Granted ✓');

      if (typeof gsap !== 'undefined') {
        gsap.to('#act-card', {
          scale: 1.015, duration: 0.18, ease: 'power2.out',
          onComplete: function () {
            gsap.to('#act-card', { scale: 1, duration: 0.22, ease: 'power2.in' });
          }
        });
        setTimeout(function () {
          gsap.to('.page-wrap', {
            opacity: 0, duration: 0.4, ease: 'power2.in',
            onComplete: function () { window.location.replace(REDIRECT); }
          });
        }, 600);
      } else {
        setTimeout(function () { window.location.replace(REDIRECT); }, 800);
      }

    } else {
      btn.disabled         = true;
      btn.style.background = 'linear-gradient(135deg,#FF4D6A,#C0392B)';
      btn.style.boxShadow  = '0 0 28px rgba(255,77,106,0.5)';
      setLabel(btn, 'Invalid License');

      if (typeof gsap !== 'undefined') {
        gsap.fromTo('#act-card',
          { x: 0 },
          { x: 10, duration: 0.07, ease: 'power1.inOut',
            yoyo: true, repeat: 5,
            onComplete: function () { gsap.set('#act-card', { x: 0 }); }
          }
        );
      }

      setTimeout(function () {
        btn.disabled         = false;
        btn.style.background = '';
        btn.style.boxShadow  = '';
        setLabel(btn, 'Activate');
      }, 1500);
    }
  }

  /* ── Init ───────────────────────────────────────── */
  function init() {
    animateIn();

    var btn   = el('activateBtn');
    var input = el('licenseKey');
    var hint  = el('demo-key-hint');

    if (!btn || !input) {
      console.error('[activation] Required elements missing from DOM');
      return;
    }

    // Clone button to strip any stale listeners
    var fresh = btn.cloneNode(true);
    btn.parentNode.replaceChild(fresh, btn);
    btn = fresh;

    btn.addEventListener('click', activate);

    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') activate();
    });

    // Input icon colour sync
    var icon = input.parentElement && input.parentElement.querySelector('svg');
    if (icon) {
      input.addEventListener('focus', function () { icon.style.color = '#00D4FF'; });
      input.addEventListener('blur',  function () { icon.style.color = ''; });
    }

    // Demo hint autofill
    if (hint) {
      hint.addEventListener('click', function () {
        input.value = VALID_KEY;
        input.focus();
        if (typeof gsap !== 'undefined') {
          gsap.fromTo(hint, { color: '#FFD060' }, { color: '#FFB830', duration: 0.6 });
        }
      });
    }

    console.log('[activation] ready');
  }

  // DOM-ready guard
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
